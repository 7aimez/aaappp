<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Icon Linker</title>
    <!-- FontAwesome for the link icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000;
            overflow: hidden;
        }

        .wrapper {
            width: 90%;
            max-width: 1000px;
            text-align: center;
        }

        /* Subtle Input at Top */
        input {
            width: 100%;
            max-width: 400px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #eee;
            color: #000;
            font-family: monospace;
            font-size: 1rem;
            font-weight: 400;
            padding: 20px 0;
            text-align: center;
            outline: none;
            transition: all 0.4s ease;
            margin-bottom: 40px;
        }

        input:focus {
            border-bottom-color: #000;
        }

        input::placeholder {
            color: #eee;
        }

        /* Massive Icon Output at Bottom */
        .output {
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #liveLink {
            color: #f0f0f0;
            /* Ghostly grey when empty */
            font-size: 6rem;
            /* Huge Icon */
            text-decoration: none;
            transition: all 0.3s ease;
            pointer-events: none;
            /* Disable click when empty */
            border: solid 1px #f0f0f0;
            padding: 10px;
            border-radius: 30px;
        }

        /* Active state when URL exists */
        #liveLink.active {
            color: #000;
            pointer-events: auto;
            border: solid 2px black;
        }

        #liveLink.active:hover {
            transform: scale(1.1);
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <input type="text" id="urlInput" placeholder="Enter URL here" spellcheck="false" autocomplete="off" autofocus>

        <div class="output">
            <a id="liveLink" href="#" target="_blank">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
        </div>
    </div>

    <script>
        const input = document.getElementById('urlInput');
        const link = document.getElementById('liveLink');

        input.addEventListener('input', () => {
            const val = input.value.trim();
            
            if (!val) {
                link.classList.remove('active');
                link.href = "#";
                return;
            }

            const formatted = /^https?:\/\//i.test(val) ? val : `https://${val}`;
            link.href = formatted;
            link.classList.add('active');
        });
    </script>
</body>

</html>
