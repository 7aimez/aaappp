<!doctype html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>url</title><link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css><style>*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;display:flex;justify-content:center;align-items:center;background-color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#000;overflow:hidden}.wrapper{width:90%;max-width:1000px;text-align:center}input{width:100%;max-width:400px;background:0 0;border:none;border-bottom:1px solid #eee;color:#000;font-family:monospace;font-size:1rem;font-weight:400;padding:20px 0;text-align:center;outline:0;transition:all .4s ease;margin-bottom:40px}input:focus{border-bottom-color:#000}input::placeholder{color:#eee}.output{min-height:150px;display:flex;justify-content:center;align-items:center}#liveLink{color:#f0f0f0;font-size:6rem;text-decoration:none;transition:all .3s ease;pointer-events:none;border:solid 1px #f0f0f0;padding:10px;border-radius:30px}#liveLink.active{color:#000;pointer-events:auto;border:solid 2px #000}#liveLink.active:hover{transform:scale(1.1);opacity:.7}</style></head><body><div class=wrapper><input id=urlInput placeholder="Enter URL here" spellcheck=false autocomplete=off autofocus><div class=output><a id=liveLink href=# target=_blank><i class="fa-solid fa-arrow-up-right-from-square"></i></a></div></div><script>const input=document.getElementById("urlInput"),link=document.getElementById("liveLink");input.addEventListener("input",(()=>{const t=input.value.trim();if(!t)return link.classList.remove("active"),void(link.href="#");const e=/^https?:\/\//i.test(t)?t:`https://${t}`;link.href=e,link.classList.add("active")}))</script></body></html>
